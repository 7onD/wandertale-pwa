<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WanderTale" />
  <meta name="theme-color" content="#2E75B6" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src *;">

  <title>WanderTale — Debug Mode</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div style="background:#f59e0b;color:#000;text-align:center;font-weight:bold;padding:10px;font-size:14px;letter-spacing:0.5px;">
    🛠 ТЕСТОВЫЙ РЕЖИМ — GPS симуляция
  </div>

  <div class="app">

    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🗺️</span>
        <h1 class="logo-title">WanderTale</h1>
      </div>
      <p class="logo-sub">Режим отладки — нажмите на карту для установки GPS</p>
    </header>

    <main class="app-main">

      <div class="status-box" id="statusBox">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Нажмите на карту, чтобы выбрать точку</span>
      </div>

      <button class="btn-main" id="mainBtn" onclick="toggleWalk()">
        <span class="btn-icon" id="btnIcon">▶</span>
        <span class="btn-label" id="btnLabel">Начать прогулку</span>
      </button>

      <div id="map" style="height:300px; border-radius:16px; overflow:hidden; margin:16px 0; cursor:crosshair;"></div>

      <div class="place-card" id="placeCard" aria-live="polite">
        <div class="card-inner" id="cardInner">
          <div class="card-placeholder">
            <span class="card-placeholder-icon">📍</span>
            <p>Нажмите на карту для симуляции GPS-координат</p>
          </div>
        </div>
      </div>

      <div class="session-stats" id="sessionStats" hidden>
        <span id="statsText"></span>
      </div>

    </main>

    <footer class="app-footer">
      <p><a href="index.html" style="color:#666;">← Назад к основному приложению</a></p>
    </footer>

  </div>

  <script src="debug.js"></script>

  <div id="debug-panel" style="position:fixed;bottom:0;left:0;right:0;background:#1e1e1e;color:#00ff00;font-size:11px;font-family:monospace;padding:8px;max-height:180px;overflow-y:auto;z-index:9999;border-top:1px solid #333;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <strong>DEBUG</strong>
      <button onclick="document.getElementById('debug-log').innerHTML=''" style="background:none;border:1px solid #444;color:#666;font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;">очистить</button>
    </div>
    <div id="debug-log"></div>
  </div>
</body>
</html>
